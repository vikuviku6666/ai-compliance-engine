services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: compliance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: compliance
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compliance-network

  neo4j:
    image: neo4j:5
    container_name: compliance-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - compliance-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: compliance-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/compliance
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HF_HUB_DISABLE_IMPLICIT_TOKEN=1
      - HUGGINGFACE_HUB_VERBOSITY=error
      - HF_HOME=/app/.hf_cache
      - PYTHONPATH=/app
    volumes:
      - hf_cache:/app/.hf_cache
      - ./backend/data:/app/backend/data
    command: |
      sh -c "
      echo 'Seeding governance graph...' &&
      python app/graph/seed_graph.py &&
      echo 'Checking and seeding RAG knowledge index...' &&
      python -c \"
      from app.rag.knowledge_index import KnowledgeIndexBuilder
      b = KnowledgeIndexBuilder()
      b.create_tables()
      stats = b.get_stats()
      print('Current stats:', stats)
      if stats.get('total_chunks', 0) == 0:
          print('First-time setup: Seeding RAG knowledge index from PDF...')
          b.index_document('backend/data/documents/compliance/eu_amlr_1624.pdf', drop_existing=True)
      else:
          print('RAG knowledge index already seeded.')
      \" &&
      echo 'Starting FastAPI backend...' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - compliance-network

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: compliance-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - compliance-network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  hf_cache:

networks:
  compliance-network:
    driver: bridge
