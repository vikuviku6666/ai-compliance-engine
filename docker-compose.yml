version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: compliance

    ports:
      - '5432:5432'

  neo4j:
    image: neo4j:5

    environment:
      NEO4J_AUTH: neo4j/password

    ports:
      - '7474:7474'
      - '7687:7687'
